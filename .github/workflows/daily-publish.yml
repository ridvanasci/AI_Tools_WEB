name: Daily Article + Deploy

on:
  schedule:
    - cron: "30 8 * * *"   # Her gün 11:30 TR - Review
    - cron: "0 9 * * 2,5"  # Salı & Cuma 12:00 TR - Comparison
    - cron: "0 9 * * 1"    # Pazartesi 12:00 TR - Best List
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      article_type:
        description: 'Article type: review, comparison, best'
        default: 'review'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --upgrade pip && pip install groq

      - name: Generate article
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          HOUR=$(date -u +%H)
          DAY=$(date -u +%u)
          TYPE="${{ github.event.inputs.article_type }}"
          if [ "$TYPE" = "comparison" ] || ([ "$HOUR" = "09" ] && ([ "$DAY" = "2" ] || [ "$DAY" = "5" ])); then
            python scripts/generate_comparison.py
          elif [ "$TYPE" = "best" ] || ([ "$HOUR" = "09" ] && [ "$DAY" = "1" ]); then
            python scripts/generate_best.py
          else
            python scripts/generate_article.py
          fi

      - name: Commit new article
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          git diff --staged --quiet || git commit -m "chore: auto-publish daily AI tool review [$(date +%Y-%m-%d)]"
          git push

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"

      - name: Build site
        run: hugo --minify

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
